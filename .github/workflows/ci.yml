name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint, Format, Typecheck
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Moscow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Moscow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:unit

  component:
    name: Component tests (jsdom)
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Moscow
      CI: true
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:component

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit, component]
    env:
      TZ: Europe/Moscow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
